<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendedor — Estoque</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f3f4f8; --surface: #ffffff; --border: #e3e5ee;
    --accent: #4f6ef7; --accent-dark: #3a57d4; --accent-soft: #eef1ff;
    --green: #16a34a; --green-soft: #f0fdf4;
    --red: #dc2626; --red-soft: #fef2f2;
    --yellow: #d97706; --yellow-soft: #fffbeb;
    --text: #14161f; --muted: #6b7280; --muted-2: #9aa0b4;
    --zebra: rgba(20,22,31,.018);
    --font: 'Inter', system-ui, sans-serif;
  }

  [data-theme="dark"] {
    --bg: #15171f; --surface: #1c1f2a; --border: #2b2f3d;
    --accent: #6e8bff; --accent-dark: #8aa2ff; --accent-soft: #25304f;
    --green: #4ade80; --green-soft: #163524;
    --red: #f87171; --red-soft: #3a1c1f;
    --yellow: #fbbf24; --yellow-soft: #3a2e12;
    --text: #e8eaf2; --muted: #9197ab; --muted-2: #6b7185;
    --zebra: rgba(255,255,255,.025);
  }

  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; transition: background .2s ease, color .2s ease; }

  /* LOGIN */
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 40px 32px; width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(20,22,31,.06); }
  .login-logo { font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); margin-bottom: 28px; }
  .login-title { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .login-sub { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .field input { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; color: var(--text); font-size: 15px; transition: border-color .15s; }
  .field input:focus { outline: none; border-color: var(--accent); }
  .btn-primary { width: 100%; background: var(--accent); border: none; border-radius: 6px; color: #fff; font-size: 15px; font-weight: 600; padding: 14px; cursor: pointer; margin-top: 8px; }
  .btn-primary:active { background: var(--accent-dark); }
  .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
  .error-msg { color: var(--red); font-size: 13px; margin-top: 10px; text-align: center; }

  /* ─── APP SHELL ─────────────────────────────────────── */
  #app-screen { display: none; }

  .app-shell { display: flex; min-height: 100vh; }

  /* SIDEBAR (desktop) */
  .sidebar {
    width: 280px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh;
  }
  .sidebar-header { padding: 22px 22px 18px; border-bottom: 1px solid var(--border); }
  .sidebar-logo { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; }
  .sidebar-user { display: flex; align-items: center; gap: 10px; }
  .sidebar-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent-soft); color: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
  .sidebar-user-name { font-size: 13.5px; font-weight: 600; line-height: 1.3; }
  .sidebar-user-role { font-size: 11px; color: var(--muted); }

  .sidebar-search-wrap { padding: 18px 22px 8px; }
  .sidebar-search { position: relative; }
  .sidebar-search input {
    width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px 10px 36px;
    font-size: 13.5px; color: var(--text); background: var(--bg); transition: border-color .15s, background .15s;
  }
  .sidebar-search input:focus { outline: none; border-color: var(--accent); background: var(--surface); }
  .sidebar-search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted-2); font-size: 14px; pointer-events: none; }

  .sidebar-filters { padding: 14px 22px; display: flex; flex-direction: column; gap: 4px; flex: 1; overflow-y: auto; }
  .filter-eyebrow { font-size: 10.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted-2); margin: 10px 0 6px; padding: 0 4px; }
  .filter-pill {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 9px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text);
    transition: background .12s; border: none; background: none; width: 100%; text-align: left;
  }
  .filter-pill:hover { background: var(--bg); }
  .filter-pill.active { background: var(--accent-soft); color: var(--accent-dark); font-weight: 600; }
  .filter-pill-left { display: flex; align-items: center; gap: 9px; }
  .filter-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .filter-dot.all { background: var(--muted-2); }
  .filter-dot.ok { background: var(--green); }
  .filter-dot.low { background: var(--yellow); }
  .filter-dot.out { background: var(--red); }
  .filter-count { font-size: 11.5px; color: var(--muted-2); font-weight: 600; }
  .filter-pill.active .filter-count { color: var(--accent); }

  .sidebar-footer { padding: 16px 22px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
  .btn-logout { width: 100%; background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 12.5px; font-weight: 500; padding: 9px; cursor: pointer; transition: all .15s; }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }
  .theme-toggle { width: 100%; background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 12.5px; font-weight: 500; padding: 9px; cursor: pointer; transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 7px; }
  .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

  /* MAIN AREA */
  .main-area { flex: 1; min-width: 0; display: flex; flex-direction: column; }

  .main-topbar {
    position: sticky; top: 0; z-index: 5; background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 16px 28px; display: none; align-items: center; justify-content: space-between;
  }
  .main-topbar-title { font-size: 15px; font-weight: 700; }
  .main-topbar-count { font-size: 12.5px; color: var(--muted); margin-top: 2px; }

  /* VIEW TOGGLE (grade / lista) */
  .view-toggle { display: flex; align-items: center; gap: 2px; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; padding: 3px; }
  .view-toggle-btn { width: 32px; height: 28px; display: flex; align-items: center; justify-content: center; border: none; background: none; border-radius: 5px; cursor: pointer; color: var(--muted-2); transition: all .15s; }
  .view-toggle-btn.active { background: var(--surface); color: var(--accent); box-shadow: 0 1px 3px rgba(20,22,31,.08); }
  .view-toggle-btn svg { width: 16px; height: 16px; }

  .grid-topbar { display: none; align-items: center; justify-content: space-between; padding: 18px 28px 4px; }

  .products-grid {
    flex: 1; padding: 8px 28px 60px; display: grid; gap: 14px;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    align-content: start;
  }
  .products-grid.list-mode { display: flex; flex-direction: column; gap: 0; padding: 0 28px 60px; }

  /* PRODUCT CARD (grade) */
  .prod-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; display: flex; flex-direction: column; transition: border-color .15s, box-shadow .15s, background .2s; }
  .prod-card:hover { border-color: #c9cde0; box-shadow: 0 2px 10px rgba(20,22,31,.05); }
  .prod-card.low { border-left: 3px solid var(--yellow); }
  .prod-card.out { border-left: 3px solid var(--red); }

  .prod-badge-row { margin-bottom: 12px; }
  .prod-top { display: flex; align-items: center; gap: 12px; }
  .prod-img { width: 52px; height: 52px; border-radius: 6px; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; }
  .prod-img-placeholder { width: 52px; height: 52px; border-radius: 6px; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }

  .prod-info { flex: 1; min-width: 0; }
  .prod-name { font-size: 14px; font-weight: 600; line-height: 1.3; }
  .prod-codes { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
  .prod-code { font-size: 9.5px; color: var(--muted); background: var(--bg); border-radius: 4px; padding: 2px 6px; }

  .prod-badge { display: inline-flex; font-size: 11px; font-weight: 700; padding: 5px 11px; border-radius: 7px; white-space: nowrap; }
  .prod-badge.ok { background: var(--green-soft); color: var(--green); }
  .prod-badge.low { background: var(--yellow-soft); color: var(--yellow); }
  .prod-badge.out { background: var(--red-soft); color: var(--red); }

  .prod-qty-row { display: flex; gap: 16px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .prod-qty-item { font-size: 11px; color: var(--muted); }
  .prod-qty-item strong { font-size: 17px; display: block; margin-top: 2px; }
  .prod-qty-item strong.qty-ok { color: var(--green); }
  .prod-qty-item strong.qty-low { color: var(--yellow); }
  .prod-qty-item strong.qty-out { color: var(--red); }
  .volt-chip { font-size: 9.5px; font-weight: 700; padding: 1px 6px; border-radius: 4px; background: var(--bg); color: var(--muted); }

  .btn-baixa-card { width: 100%; background: var(--red-soft); border: 1px solid transparent; border-radius: 6px; color: var(--red); font-size: 12.5px; font-weight: 600; padding: 9px; cursor: pointer; margin-top: 12px; transition: background .12s; }
  .btn-baixa-card:hover { background: #fde4e4; }
  .btn-baixa-card:active { background: #fbd0d0; }

  /* LIST VIEW (lista compacta) */
  .prod-row { display: flex; align-items: center; gap: 14px; padding: 11px 12px; border-bottom: 1px solid var(--border); transition: background .12s; border-radius: 6px; }
  .prod-row:nth-child(even) { background: var(--zebra); }
  .prod-row:hover { background: var(--accent-soft); }
  .prod-row-img { width: 38px; height: 38px; border-radius: 6px; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; }
  .prod-row-img-ph { width: 38px; height: 38px; border-radius: 6px; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .prod-row-info { flex: 1; min-width: 0; }
  .prod-row-name { font-size: 13.5px; font-weight: 600; }
  .prod-row-codes { font-size: 10.5px; color: var(--muted-2); margin-top: 1px; }
  .prod-row-qty { display: flex; gap: 14px; flex-shrink: 0; }
  .prod-row-qty-item { text-align: center; min-width: 44px; }
  .prod-row-qty-item .label { font-size: 9px; color: var(--muted-2); text-transform: uppercase; letter-spacing: .04em; }
  .prod-row-qty-item .value { font-size: 14px; font-weight: 700; }
  .prod-row-badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 6px; white-space: nowrap; flex-shrink: 0; min-width: 92px; text-align: center; }
  .prod-row-badge.ok { background: var(--green-soft); color: var(--green); }
  .prod-row-badge.low { background: var(--yellow-soft); color: var(--yellow); }
  .prod-row-badge.out { background: var(--red-soft); color: var(--red); }
  .btn-baixa-row { background: var(--red-soft); border: none; border-radius: 6px; color: var(--red); font-size: 12px; font-weight: 600; padding: 7px 14px; cursor: pointer; flex-shrink: 0; transition: background .12s; white-space: nowrap; }
  .btn-baixa-row:hover { background: #fde4e4; }

  .empty-state { text-align: center; color: var(--muted); font-size: 14px; padding: 60px 20px; grid-column: 1 / -1; }

  /* PAINEL DE BAIXA — modal centrado no desktop, bottom-sheet no mobile */
  .side-overlay { display: none; position: fixed; inset: 0; background: rgba(20,22,31,.5); z-index: 200; }
  .side-overlay.open { display: block; }
  .side-panel {
    position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 420px; max-width: 92vw; max-height: 88vh; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px; z-index: 201;
    padding: 24px; overflow-y: auto; box-shadow: 0 20px 60px rgba(20,22,31,.25);
    opacity: 0; pointer-events: none; transition: opacity .2s ease;
  }
  .side-panel.open { opacity: 1; pointer-events: auto; }

  .side-panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .side-panel-title { font-size: 16px; font-weight: 700; }
  .side-panel-close { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; }
  .baixa-prod-info { display: flex; align-items: center; gap: 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 20px; }
  .baixa-prod-img { width: 52px; height: 52px; border-radius: 6px; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; }
  .baixa-prod-img-ph { width: 52px; height: 52px; border-radius: 6px; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .baixa-prod-name { font-weight: 600; font-size: 14px; }
  .baixa-prod-qty { font-size: 12px; color: var(--muted); margin-top: 3px; }

  .volt-choice { display: flex; gap: 10px; margin-bottom: 16px; }
  .volt-choice-btn { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; text-align: center; cursor: pointer; transition: all .15s; }
  .volt-choice-btn.selected { border-color: var(--accent); background: var(--accent-soft); }
  .volt-choice-btn .vc-label { font-size: 13px; font-weight: 700; }
  .volt-choice-btn .vc-qty { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .baixa-qty-display { text-align: center; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin: 8px 0 16px; }
  .baixa-qty-display .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
  .baixa-qty-display .value { font-size: 28px; font-weight: 700; }
  .baixa-qty-display .value.negative { color: var(--red); }

  .btn-confirm-baixa { width: 100%; background: var(--red); border: none; border-radius: 6px; color: #fff; font-size: 14px; font-weight: 600; padding: 13px; cursor: pointer; margin-top: 10px; transition: opacity .15s; }
  .btn-confirm-baixa:hover { opacity: .9; }
  .btn-confirm-baixa:disabled { opacity: .5; cursor: not-allowed; }
  .baixa-error { color: var(--red); font-size: 12px; margin-top: 8px; text-align: center; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: #14161f; color: #fff; font-size: 13px; font-weight: 500; padding: 12px 20px; border-radius: 6px; box-shadow: 0 4px 20px rgba(0,0,0,.2); transition: transform .3s ease; z-index: 99; white-space: nowrap; max-width: 90vw; overflow: hidden; text-overflow: ellipsis; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ─── MOBILE (<900px): empilha tudo, sidebar vira topo, busca rola junto ─── */
  @media (max-width: 899px) {
    .app-shell { flex-direction: column; }
    .sidebar { width: 100%; height: auto; position: static; border-right: none; border-bottom: 1px solid var(--border); flex-direction: column; }
    .sidebar-filters { flex-direction: row; overflow-x: auto; overflow-y: visible; padding: 10px 16px 14px; gap: 8px; }
    .filter-eyebrow { display: none; }
    .filter-pill { width: auto; white-space: nowrap; flex-shrink: 0; }
    .sidebar-header { padding: 16px 16px 12px; }
    .sidebar-search-wrap { padding: 12px 16px 4px; }
    .sidebar-footer { display: none; }
    .main-topbar { display: flex; padding: 12px 16px; }
    .view-toggle { display: none; }
    .grid-topbar { display: none !important; }
    .products-grid { padding: 14px 16px 60px; grid-template-columns: 1fr !important; gap: 10px; display: grid !important; }
    .side-panel { left: 0; right: 0; bottom: 0; top: auto; transform: translateY(100%); width: 100%; max-width: 100%; border-radius: 16px 16px 0 0; max-height: 88vh; }
    .side-panel.open { transform: translateY(0); }
  }

  /* Mobile precisa de um botão de sair visível já que o footer da sidebar some */
  @media (max-width: 899px) {
    .main-topbar-logout { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 12px; padding: 7px 12px; cursor: pointer; }
    .main-topbar-theme { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 13px; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  }
  @media (min-width: 900px) {
    .main-topbar-logout { display: none; }
    .grid-topbar { display: flex; }
  }
</style>

</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Ponto da Sublimação</div>
    <div class="login-title">Área do Vendedor</div>
    <div class="login-sub">Entre com seu usuário e senha</div>
    <div class="field"><label>Usuário</label><input type="text" id="login-usuario" placeholder="seu usuário" autocomplete="username"></div>
    <div class="field"><label>Senha</label><input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn-primary" id="btn-login" onclick="doLogin()">Entrar</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<div id="app-screen">
  <div class="app-shell">

    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">Ponto da Sublimação</div>
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="user-avatar">V</div>
          <div>
            <div class="sidebar-user-name" id="user-name">—</div>
            <div class="sidebar-user-role">Vendedor</div>
          </div>
        </div>
      </div>

      <div class="sidebar-search-wrap">
        <div class="sidebar-search">
          <span class="sidebar-search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="Buscar produto..." oninput="renderCards()">
        </div>
      </div>

      <nav class="sidebar-filters">
        <div class="filter-eyebrow">Status</div>
        <button class="filter-pill active" data-filter="" onclick="setStatusFilter('')">
          <span class="filter-pill-left"><span class="filter-dot all"></span>Todos os produtos</span>
          <span class="filter-count" id="count-all">0</span>
        </button>
        <button class="filter-pill" data-filter="ok" onclick="setStatusFilter('ok')">
          <span class="filter-pill-left"><span class="filter-dot ok"></span>Em estoque</span>
          <span class="filter-count" id="count-ok">0</span>
        </button>
        <button class="filter-pill" data-filter="low" onclick="setStatusFilter('low')">
          <span class="filter-pill-left"><span class="filter-dot low"></span>Estoque baixo</span>
          <span class="filter-count" id="count-low">0</span>
        </button>
        <button class="filter-pill" data-filter="out" onclick="setStatusFilter('out')">
          <span class="filter-pill-left"><span class="filter-dot out"></span>Sem estoque</span>
          <span class="filter-count" id="count-out">0</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <button class="theme-toggle" id="theme-toggle-btn" onclick="toggleTheme()">
          <span id="theme-icon">🌙</span>
          <span id="theme-label">Modo escuro</span>
        </button>
        <button class="btn-logout" onclick="doLogout()">Sair da conta</button>
      </div>
    </aside>

    <div class="main-area">
      <div class="main-topbar">
        <div>
          <div class="main-topbar-title">Estoque</div>
          <div class="main-topbar-count" id="topbar-count"></div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="main-topbar-theme" onclick="toggleTheme()" id="theme-icon-mobile">🌙</button>
          <button class="main-topbar-logout" onclick="doLogout()">Sair</button>
        </div>
      </div>

      <div class="grid-topbar">
        <div class="main-topbar-count" id="topbar-count-desktop"></div>
        <div class="view-toggle">
          <button class="view-toggle-btn active" id="view-grid-btn" onclick="setViewMode('grid')" title="Visualizar em grade">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
          </button>
          <button class="view-toggle-btn" id="view-list-btn" onclick="setViewMode('list')" title="Visualizar em lista">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
        </div>
      </div>

      <div class="products-grid" id="products-list">
        <div class="empty-state">Carregando produtos...</div>
      </div>
    </div>

  </div>
</div>

<!-- PAINEL DE BAIXA -->
<div class="side-overlay" id="baixa-overlay" onclick="closeBaixaPanel()"></div>
<div class="side-panel" id="baixa-panel">
  <div class="side-panel-header">
    <div class="side-panel-title">Dar baixa no estoque</div>
    <button class="side-panel-close" onclick="closeBaixaPanel()">&times;</button>
  </div>

  <div class="baixa-prod-info" id="baixa-prod-info"></div>

  <div id="baixa-volt-choice-wrap" style="display:none">
    <div class="field"><label>Selecione a voltagem</label></div>
    <div class="volt-choice" id="baixa-volt-choice"></div>
  </div>

  <div class="field">
    <label>Quantidade vendida</label>
    <input type="number" id="baixa-qty" min="1" placeholder="0" oninput="updateBaixaPreview()">
  </div>

  <div class="baixa-qty-display">
    <div class="label">Estoque após a baixa</div>
    <div class="value" id="baixa-preview-value">—</div>
  </div>

  <button class="btn-confirm-baixa" id="btn-confirm-baixa" onclick="confirmBaixa()">Confirmar baixa</button>
  <div class="baixa-error" id="baixa-error"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://pcugivsgiudlxhnuvttf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_iMMKiY9-Rl95kESNDtHtYA_lFm-P1Ax';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let products = [];
let vendedorAtual = null; // registro da tabela `vendedores` ligado ao login atual

// Estado do painel de baixa
let baixaProduto = null;
let baixaVoltagemSelecionada = null;

// ─── AUTH ────────────────────────────────────────────────
async function checkSession() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    await loadVendedorAtual(session.user.id);
    if (vendedorAtual) {
      showApp();
      await loadProducts();
    } else {
      await sb.auth.signOut();
    }
  }
}

sb.auth.onAuthStateChange((event) => {
  if (event === 'SIGNED_OUT') {
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }
});

async function loadVendedorAtual(authUserId) {
  const { data } = await sb.from('vendedores').select('*').eq('auth_user_id', authUserId).maybeSingle();
  vendedorAtual = data || null;
}

async function doLogin() {
  const usuario = document.getElementById('login-usuario').value.trim().toLowerCase();
  const pass = document.getElementById('login-pass').value;
  const errorEl = document.getElementById('login-error');
  const btn = document.getElementById('btn-login');
  errorEl.textContent = '';

  if (!usuario || !pass) { errorEl.textContent = 'Preencha usuário e senha.'; return; }

  btn.disabled = true; btn.textContent = 'Entrando...';

  const emailFake = `${usuario}@vendedor.estoque.local`;
  const { data, error } = await sb.auth.signInWithPassword({ email: emailFake, password: pass });

  btn.disabled = false; btn.textContent = 'Entrar';

  if (error) { errorEl.textContent = 'Usuário ou senha incorretos.'; return; }

  await loadVendedorAtual(data.user.id);
  if (!vendedorAtual) {
    errorEl.textContent = 'Este login não está vinculado a um vendedor. Fale com o administrador.';
    await sb.auth.signOut();
    return;
  }

  document.getElementById('user-name').textContent = vendedorAtual.nome;
  showApp();
  await loadProducts();
}

async function doLogout() { await sb.auth.signOut(); }

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  const nome = vendedorAtual?.nome || '';
  document.getElementById('user-name').textContent = nome;
  document.getElementById('user-avatar').textContent = nome ? nome.trim()[0].toUpperCase() : 'V';

  // Aplica o modo de visualização padrão (lista) na UI do toggle
  document.getElementById('view-grid-btn').classList.toggle('active', viewMode === 'grid');
  document.getElementById('view-list-btn').classList.toggle('active', viewMode === 'list');
  document.getElementById('products-list').classList.toggle('list-mode', viewMode === 'list');
}

// ─── TEMA (claro/escuro) ──────────────────────────────────
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const icon = theme === 'dark' ? '☀️' : '🌙';
  const label = theme === 'dark' ? 'Modo claro' : 'Modo escuro';
  const iconEl = document.getElementById('theme-icon');
  const labelEl = document.getElementById('theme-label');
  const iconMobileEl = document.getElementById('theme-icon-mobile');
  if (iconEl) iconEl.textContent = icon;
  if (labelEl) labelEl.textContent = label;
  if (iconMobileEl) iconMobileEl.textContent = icon;
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
  const next = current === 'dark' ? 'light' : 'dark';
  localStorage.setItem('vendedor-theme', next);
  applyTheme(next);
}

(function initTheme() {
  const saved = localStorage.getItem('vendedor-theme');
  if (saved === 'dark') applyTheme('dark');
})();

// ─── PRODUTOS (somente leitura + baixa) ──────────────────
let statusFilter = '';
let viewMode = 'list';

function setStatusFilter(status) {
  statusFilter = status;
  document.querySelectorAll('.filter-pill').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === status);
  });
  renderCards();
}

function setViewMode(mode) {
  viewMode = mode;
  document.getElementById('view-grid-btn').classList.toggle('active', mode === 'grid');
  document.getElementById('view-list-btn').classList.toggle('active', mode === 'list');
  document.getElementById('products-list').classList.toggle('list-mode', mode === 'list');
  renderCards();
}

async function loadProducts() {
  const { data } = await sb.from('produtos').select('*').order('nome');
  products = data || [];
  renderCards();
}

function totalQty(p) { return p.tem_voltagem ? (p.quantidade_110v + p.quantidade_220v) : p.quantidade; }

function getStatus(p) {
  const qty = totalQty(p);
  if (qty === 0) return { cls: 'out', label: 'Sem estoque' };
  if (qty <= (p.minimo || 0)) return { cls: 'low', label: 'Estoque baixo' };
  return { cls: 'ok', label: 'OK' };
}

function updateFilterCounts() {
  const counts = { ok: 0, low: 0, out: 0 };
  products.forEach(p => { counts[getStatus(p).cls]++; });
  document.getElementById('count-all').textContent = products.length;
  document.getElementById('count-ok').textContent = counts.ok;
  document.getElementById('count-low').textContent = counts.low;
  document.getElementById('count-out').textContent = counts.out;
}

function codesArray(p) {
  const codes = [];
  if (p.codigo_fabricante) codes.push(`Fab: ${p.codigo_fabricante}`);
  if (p.codigo_interno) codes.push(`Int: ${p.codigo_interno}`);
  if (p.codigo_referencia) codes.push(`Ref: ${p.codigo_referencia}`);
  return codes;
}

function renderCards() {
  updateFilterCounts();

  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = products.filter(p => {
    const matchesSearch =
      p.nome.toLowerCase().includes(q) ||
      (p.codigo_fabricante||'').toLowerCase().includes(q) ||
      (p.codigo_interno||'').toLowerCase().includes(q) ||
      (p.codigo_referencia||'').toLowerCase().includes(q);
    const matchesStatus = !statusFilter || getStatus(p).cls === statusFilter;
    return matchesSearch && matchesStatus;
  });

  const countText = `${filtered.length} produto${filtered.length === 1 ? '' : 's'}`;
  const topbarCount = document.getElementById('topbar-count');
  if (topbarCount) topbarCount.textContent = countText;
  const topbarCountDesktop = document.getElementById('topbar-count-desktop');
  if (topbarCountDesktop) topbarCountDesktop.textContent = countText;

  const el = document.getElementById('products-list');
  if (!filtered.length) { el.innerHTML = '<div class="empty-state">Nenhum produto encontrado.</div>'; return; }

  const effectiveMode = window.innerWidth < 900 ? 'grid' : viewMode;
  el.innerHTML = effectiveMode === 'list'
    ? filtered.map(p => renderRow(p)).join('')
    : filtered.map(p => renderCard(p)).join('');
}

function renderCard(p) {
  const status = getStatus(p);

  const imgHTML = p.imagem_url
    ? `<img class="prod-img" src="${p.imagem_url}" alt="${p.nome}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    + `<div class="prod-img-placeholder" style="display:none">📦</div>`
    : `<div class="prod-img-placeholder">📦</div>`;

  const codes = codesArray(p);
  const codesHTML = codes.length
    ? `<div class="prod-codes">${codes.map(c => `<span class="prod-code">${c}</span>`).join('')}</div>`
    : '';

  let qtyRowHTML;
  if (p.tem_voltagem) {
    qtyRowHTML = `
      <div class="prod-qty-row">
        <div class="prod-qty-item"><span class="volt-chip">110V</span><strong class="qty-${status.cls}">${p.quantidade_110v}</strong></div>
        <div class="prod-qty-item"><span class="volt-chip">220V</span><strong class="qty-${status.cls}">${p.quantidade_220v}</strong></div>
      </div>`;
  } else {
    qtyRowHTML = `
      <div class="prod-qty-row">
        <div class="prod-qty-item">Em estoque<strong class="qty-${status.cls}">${p.quantidade}</strong></div>
      </div>`;
  }

  return `<div class="prod-card ${status.cls}" id="card-${p.id}">
    <div class="prod-badge-row"><span class="prod-badge ${status.cls}">${status.label}</span></div>
    <div class="prod-top">
      ${imgHTML}
      <div class="prod-info">
        <div class="prod-name">${p.nome}</div>
        ${codesHTML}
      </div>
    </div>
    ${qtyRowHTML}
    <button class="btn-baixa-card" onclick="openBaixaPanel(${p.id})">Dar baixa</button>
  </div>`;
}

function renderRow(p) {
  const status = getStatus(p);

  const imgHTML = p.imagem_url
    ? `<img class="prod-row-img" src="${p.imagem_url}" alt="${p.nome}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
    + `<div class="prod-row-img-ph" style="display:none">📦</div>`
    : `<div class="prod-row-img-ph">📦</div>`;

  const codes = codesArray(p);
  const codesText = codes.length ? codes.join(' · ') : '';

  let qtyHTML;
  if (p.tem_voltagem) {
    qtyHTML = `
      <div class="prod-row-qty-item"><div class="label">110V</div><div class="value qty-${status.cls}">${p.quantidade_110v}</div></div>
      <div class="prod-row-qty-item"><div class="label">220V</div><div class="value qty-${status.cls}">${p.quantidade_220v}</div></div>`;
  } else {
    qtyHTML = `<div class="prod-row-qty-item"><div class="label">Qtd.</div><div class="value qty-${status.cls}">${p.quantidade}</div></div>`;
  }

  return `<div class="prod-row" id="row-${p.id}">
    ${imgHTML}
    <div class="prod-row-info">
      <div class="prod-row-name">${p.nome}</div>
      ${codesText ? `<div class="prod-row-codes">${codesText}</div>` : ''}
    </div>
    <div class="prod-row-qty">${qtyHTML}</div>
    <span class="prod-row-badge ${status.cls}">${status.label}</span>
    <button class="btn-baixa-row" onclick="openBaixaPanel(${p.id})">Dar baixa</button>
  </div>`;
}

// ─── PAINEL DE BAIXA ─────────────────────────────────────
function openBaixaPanel(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  baixaProduto = p;
  baixaVoltagemSelecionada = null;

  document.getElementById('baixa-prod-info').innerHTML = `
    ${p.imagem_url
      ? `<img class="baixa-prod-img" src="${p.imagem_url}" onerror="this.outerHTML='<div class=baixa-prod-img-ph>📦</div>'">`
      : `<div class="baixa-prod-img-ph">📦</div>`}
    <div>
      <div class="baixa-prod-name">${p.nome}</div>
      <div class="baixa-prod-qty">${p.tem_voltagem ? `110V: ${p.quantidade_110v} · 220V: ${p.quantidade_220v}` : `Estoque atual: ${p.quantidade}`}</div>
    </div>`;

  const voltWrap = document.getElementById('baixa-volt-choice-wrap');
  if (p.tem_voltagem) {
    voltWrap.style.display = 'block';
    document.getElementById('baixa-volt-choice').innerHTML = `
      <div class="volt-choice-btn" id="vc-110" onclick="selectBaixaVolt('v110')">
        <div class="vc-label">110V</div><div class="vc-qty">${p.quantidade_110v} em estoque</div>
      </div>
      <div class="volt-choice-btn" id="vc-220" onclick="selectBaixaVolt('v220')">
        <div class="vc-label">220V</div><div class="vc-qty">${p.quantidade_220v} em estoque</div>
      </div>`;
  } else {
    voltWrap.style.display = 'none';
  }

  document.getElementById('baixa-qty').value = '';
  document.getElementById('baixa-error').textContent = '';
  updateBaixaPreview();

  document.getElementById('baixa-overlay').classList.add('open');
  document.getElementById('baixa-panel').classList.add('open');
}

function closeBaixaPanel() {
  document.getElementById('baixa-overlay').classList.remove('open');
  document.getElementById('baixa-panel').classList.remove('open');
  baixaProduto = null;
  baixaVoltagemSelecionada = null;
}

function selectBaixaVolt(volt) {
  baixaVoltagemSelecionada = volt;
  document.getElementById('vc-110').classList.toggle('selected', volt === 'v110');
  document.getElementById('vc-220').classList.toggle('selected', volt === 'v220');
  updateBaixaPreview();
}

function currentBaixaEstoqueAtual() {
  if (!baixaProduto) return 0;
  if (!baixaProduto.tem_voltagem) return baixaProduto.quantidade;
  if (baixaVoltagemSelecionada === 'v110') return baixaProduto.quantidade_110v;
  if (baixaVoltagemSelecionada === 'v220') return baixaProduto.quantidade_220v;
  return null;
}

function updateBaixaPreview() {
  const display = document.getElementById('baixa-preview-value');
  const atual = currentBaixaEstoqueAtual();
  const qtyInput = parseInt(document.getElementById('baixa-qty').value) || 0;

  if (atual === null) { display.textContent = 'Selecione a voltagem'; display.classList.remove('negative'); return; }

  const resultado = atual - qtyInput;
  display.textContent = resultado;
  display.classList.toggle('negative', resultado < 0);
}

async function confirmBaixa() {
  const errorEl = document.getElementById('baixa-error');
  errorEl.textContent = '';

  if (!baixaProduto || !vendedorAtual) return;
  if (baixaProduto.tem_voltagem && !baixaVoltagemSelecionada) { errorEl.textContent = 'Selecione a voltagem.'; return; }

  const qty = parseInt(document.getElementById('baixa-qty').value) || 0;
  if (qty <= 0) { errorEl.textContent = 'Informe uma quantidade válida.'; return; }

  const atual = currentBaixaEstoqueAtual();
  if (qty > atual) { errorEl.textContent = `Quantidade maior que o estoque disponível (${atual}).`; return; }

  const novaQty = atual - qty;
  const btn = document.getElementById('btn-confirm-baixa');
  btn.disabled = true; btn.textContent = 'Salvando...';

  const agora = new Date().toISOString();
  const vendedorNome = vendedorAtual.nome;
  let updateBody = { ultima_baixa_vendedor: vendedorNome, ultima_baixa_em: agora };
  let voltLabel = null;

  if (baixaProduto.tem_voltagem) {
    voltLabel = baixaVoltagemSelecionada === 'v110' ? '110V' : '220V';
    updateBody[baixaVoltagemSelecionada === 'v110' ? 'quantidade_110v' : 'quantidade_220v'] = novaQty;
    updateBody.ultima_baixa_voltagem = voltLabel;
  } else {
    updateBody.quantidade = novaQty;
    updateBody.ultima_baixa_voltagem = null;
  }

  await sb.from('produtos').update(updateBody).eq('id', baixaProduto.id);
  await sb.from('historico').insert({
    produto_id: baixaProduto.id,
    quantidade_anterior: atual,
    quantidade_nova: novaQty,
    usuario: vendedorNome,
    vendedor: vendedorNome,
    voltagem: voltLabel,
    tipo: 'baixa'
  });

  btn.disabled = false; btn.textContent = 'Confirmar baixa';
  const nomeProduto = baixaProduto.nome;
  closeBaixaPanel();
  showToast(`Baixa registrada: ${nomeProduto} → ${novaQty}${voltLabel ? ' ('+voltLabel+')' : ''}`);
  await loadProducts();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('login-usuario').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { if (products.length) renderCards(); }, 150);
});

checkSession();
</script>
</body>
</html>
