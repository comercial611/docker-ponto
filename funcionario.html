<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atualização de Estoque</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="css/funcionario.css?v=20260710-realtime">
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Ponto da Sublimação</div>
    <div class="login-title">Atualizar estoque</div>
    <div class="login-sub">Entre com seu acesso de funcionário</div>
    <div class="field"><label>E-mail</label><input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email"></div>
    <div class="field"><label>Senha</label><input type="password" id="login-pass" placeholder="••••••••"></div>
    <button class="btn-primary" onclick="doLogin()">Entrar</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<div id="app-screen">
  <header>
    <div>
      <div class="header-title">Contagem de estoque</div>
      <div class="header-user" id="user-email"></div>
    </div>
    <button class="btn-logout" onclick="doLogout()">Sair</button>
  </header>
  <div class="search-wrap">
    <input class="search-input" id="search-input" placeholder="🔍  Buscar produto..." oninput="renderCards()">
  </div>
  <div class="products-list" id="products-list">
    <div class="empty-state">Carregando produtos...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/supabase-config.js"></script>
<script src="js/funcionario.js?v=20260710-realtime"></script>
</body>
</html>
