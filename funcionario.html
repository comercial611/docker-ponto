<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atualização de Estoque</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f7fa; --surface: #ffffff; --border: #e2e6f0;
    --accent: #4f6ef7; --accent-dark: #3a57d4;
    --green: #16a34a; --red: #dc2626; --yellow: #d97706;
    --text: #1a1d2e; --muted: #6b7280; --font: 'Inter', system-ui, sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px 32px; width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,.06); }
  .login-logo { font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); margin-bottom: 28px; }
  .login-title { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .login-sub { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .field input { width: 100%; border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 15px; transition: border-color .15s; }
  .field input:focus { outline: none; border-color: var(--accent); }
  .btn-primary { width: 100%; background: var(--accent); border: none; border-radius: 10px; color: #fff; font-size: 15px; font-weight: 600; padding: 14px; cursor: pointer; margin-top: 8px; }
  .btn-primary:active { background: var(--accent-dark); }
  .error-msg { color: var(--red); font-size: 13px; margin-top: 10px; text-align: center; }

  #app-screen { display: none; max-width: 540px; margin: 0 auto; padding: 0 0 80px; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .header-title { font-size: 15px; font-weight: 700; }
  .header-user { font-size: 12px; color: var(--muted); }
  .btn-logout { background: none; border: none; color: var(--muted); font-size: 12px; cursor: pointer; }

  .search-wrap { padding: 16px 20px 8px; }
  .search-input { width: 100%; border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; font-size: 14px; color: var(--text); background: var(--surface); }
  .search-input:focus { outline: none; border-color: var(--accent); }

  .products-list { padding: 8px 20px; display: flex; flex-direction: column; gap: 10px; }

  .prod-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
  .prod-card.low { border-left: 3px solid #f59e0b; }
  .prod-card.out { border-left: 3px solid var(--red); }

  .prod-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }

  .prod-img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; border: 1px solid var(--border); flex-shrink: 0; }
  .prod-img-placeholder { width: 60px; height: 60px; border-radius: 10px; background: #f0f2f8; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }

  .prod-info { flex: 1; min-width: 0; }
  .prod-name { font-size: 15px; font-weight: 600; line-height: 1.3; }
  .prod-codes { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
  .prod-code { font-size: 10px; color: var(--muted); background: #f0f2f8; border-radius: 4px; padding: 2px 7px; }

  .prod-badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; align-self: flex-start; }
  .prod-badge.ok { background: #f0fdf4; color: var(--green); }
  .prod-badge.low { background: #fffbeb; color: var(--yellow); }
  .prod-badge.out { background: #fef2f2; color: var(--red); }

  .qty-row { display: flex; align-items: center; gap: 10px; }
  .qty-current { font-size: 13px; color: var(--muted); flex: 1; }
  .qty-current strong { color: var(--text); font-size: 18px; }
  .counter { display: flex; align-items: center; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .counter-btn { width: 40px; height: 40px; background: var(--bg); border: none; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
  .counter-btn:active { background: var(--border); }
  .counter-input { width: 56px; height: 40px; border: none; border-left: 1px solid var(--border); border-right: 1px solid var(--border); text-align: center; font-size: 16px; font-weight: 700; color: var(--text); font-family: var(--font); }
  .counter-input:focus { outline: none; background: #f0f4ff; }
  .btn-update { background: var(--accent); border: none; border-radius: 8px; color: #fff; font-size: 13px; font-weight: 600; padding: 10px 14px; cursor: pointer; white-space: nowrap; }
  .btn-update:active { background: var(--accent-dark); }
  .btn-update.saved { background: var(--green); }

  /* VOLTAGEM */
  .volt-section { border-top: 1px solid var(--border); padding-top: 12px; margin-top: 4px; }
  .volt-section:first-child { border-top: none; padding-top: 0; margin-top: 0; }
  .volt-label-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .volt-chip { font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 20px; }
  .volt-chip.v110 { background: #fff7ed; color: #d97706; }
  .volt-chip.v220 { background: #eef1ff; color: var(--accent); }

  .empty-state { text-align: center; color: var(--muted); font-size: 14px; padding: 60px 20px; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1a1d2e; color: #fff; font-size: 13px; font-weight: 500; padding: 12px 20px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,.2); transition: transform .3s ease; z-index: 99; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Ponto da Sublimação</div>
    <div class="login-title">Atualizar estoque</div>
    <div class="login-sub">Entre com seu acesso de funcionário</div>
    <div class="field"><label>E-mail</label><input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email"></div>
    <div class="field"><label>Senha</label><input type="password" id="login-pass" placeholder="••••••••"></div>
    <button class="btn-primary" onclick="doLogin()">Entrar</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<div id="app-screen">
  <header>
    <div>
      <div class="header-title">Contagem de estoque</div>
      <div class="header-user" id="user-email"></div>
    </div>
    <button class="btn-logout" onclick="doLogout()">Sair</button>
  </header>
  <div class="search-wrap">
    <input class="search-input" id="search-input" placeholder="🔍  Buscar produto..." oninput="renderCards()">
  </div>
  <div class="products-list" id="products-list">
    <div class="empty-state">Carregando produtos...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://pcugivsgiudlxhnuvttf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_iMMKiY9-Rl95kESNDtHtYA_lFm-P1Ax';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let products = [];
let newQtys = {};       // { id: qty }                  -> produtos sem voltagem
let newQtysVolt = {};   // { id: { v110: x, v220: y } }  -> produtos com voltagem
let userEmail = null;

async function checkSession() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    userEmail = session.user.email;
    document.getElementById('user-email').textContent = userEmail;
    showApp();
    await loadProducts();
  }
}

sb.auth.onAuthStateChange((event) => {
  if (event === 'SIGNED_OUT') {
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }
});

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  document.getElementById('login-error').textContent = '';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { document.getElementById('login-error').textContent = 'E-mail ou senha incorretos.'; return; }
  userEmail = data.user.email;
  document.getElementById('user-email').textContent = userEmail;
  showApp();
  await loadProducts();
}

async function doLogout() { await sb.auth.signOut(); }

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
}

async function loadProducts() {
  const { data } = await sb.from('produtos').select('*').order('nome');
  products = data || [];
  newQtys = {};
  newQtysVolt = {};
  products.forEach(p => {
    if (p.tem_voltagem) {
      newQtysVolt[p.id] = { v110: p.quantidade_110v || 0, v220: p.quantidade_220v || 0 };
    } else {
      newQtys[p.id] = p.quantidade;
    }
  });
  renderCards();
}

function totalQty(p) {
  return p.tem_voltagem ? (p.quantidade_110v + p.quantidade_220v) : p.quantidade;
}

function getStatus(p) {
  const qty = totalQty(p);
  if (qty === 0) return { cls: 'out', label: 'Sem estoque' };
  if (qty <= (p.minimo || 0)) return { cls: 'low', label: 'Estoque baixo' };
  return { cls: 'ok', label: 'OK' };
}

function renderCards() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = products.filter(p =>
    p.nome.toLowerCase().includes(q) ||
    (p.codigo_fabricante||'').toLowerCase().includes(q) ||
    (p.codigo_interno||'').toLowerCase().includes(q) ||
    (p.codigo_referencia||'').toLowerCase().includes(q)
  );
  const el = document.getElementById('products-list');
  if (!filtered.length) { el.innerHTML = '<div class="empty-state">Nenhum produto encontrado.</div>'; return; }

  el.innerHTML = filtered.map(p => {
    const status = getStatus(p);

    const imgHTML = p.imagem_url
      ? `<img class="prod-img" src="${p.imagem_url}" alt="${p.nome}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      + `<div class="prod-img-placeholder" style="display:none">📦</div>`
      : `<div class="prod-img-placeholder">📦</div>`;

    const codes = [];
    if (p.codigo_fabricante) codes.push(`Fab: ${p.codigo_fabricante}`);
    if (p.codigo_interno) codes.push(`Int: ${p.codigo_interno}`);
    if (p.codigo_referencia) codes.push(`Ref: ${p.codigo_referencia}`);
    const codesHTML = codes.length
      ? `<div class="prod-codes">${codes.map(c => `<span class="prod-code">${c}</span>`).join('')}</div>`
      : '';

    let qtyBlockHTML;
    if (p.tem_voltagem) {
      const qty110 = newQtysVolt[p.id]?.v110 ?? p.quantidade_110v;
      const qty220 = newQtysVolt[p.id]?.v220 ?? p.quantidade_220v;
      qtyBlockHTML = `
        <div class="volt-section">
          <div class="volt-label-row"><span class="volt-chip v110">110V</span><span class="qty-current">Atual: <strong>${p.quantidade_110v}</strong></span></div>
          <div class="qty-row">
            <div class="counter">
              <button class="counter-btn" onclick="adjVolt(${p.id}, 'v110', -1)">−</button>
              <input class="counter-input" type="number" min="0" id="qty-${p.id}-110" value="${qty110}" oninput="onQtyInputVolt(${p.id}, 'v110', this.value)">
              <button class="counter-btn" onclick="adjVolt(${p.id}, 'v110', 1)">+</button>
            </div>
            <button class="btn-update" id="btn-${p.id}-110" onclick="saveQtyVolt(${p.id}, 'v110')" style="flex:1">Salvar 110V</button>
          </div>
        </div>
        <div class="volt-section">
          <div class="volt-label-row"><span class="volt-chip v220">220V</span><span class="qty-current">Atual: <strong>${p.quantidade_220v}</strong></span></div>
          <div class="qty-row">
            <div class="counter">
              <button class="counter-btn" onclick="adjVolt(${p.id}, 'v220', -1)">−</button>
              <input class="counter-input" type="number" min="0" id="qty-${p.id}-220" value="${qty220}" oninput="onQtyInputVolt(${p.id}, 'v220', this.value)">
              <button class="counter-btn" onclick="adjVolt(${p.id}, 'v220', 1)">+</button>
            </div>
            <button class="btn-update" id="btn-${p.id}-220" onclick="saveQtyVolt(${p.id}, 'v220')" style="flex:1">Salvar 220V</button>
          </div>
        </div>`;
    } else {
      const qty = newQtys[p.id] ?? p.quantidade;
      qtyBlockHTML = `
        <div class="qty-row">
          <div class="qty-current">Atual: <strong>${p.quantidade}</strong></div>
          <div class="counter">
            <button class="counter-btn" onclick="adj(${p.id}, -1)">−</button>
            <input class="counter-input" type="number" min="0" id="qty-${p.id}" value="${qty}" oninput="onQtyInput(${p.id}, this.value)">
            <button class="counter-btn" onclick="adj(${p.id}, 1)">+</button>
          </div>
          <button class="btn-update" id="btn-${p.id}" onclick="saveQty(${p.id})">Salvar</button>
        </div>`;
    }

    return `<div class="prod-card ${status.cls}" id="card-${p.id}">
      <div class="prod-top">
        ${imgHTML}
        <div class="prod-info">
          <div class="prod-name">${p.nome}</div>
          ${codesHTML}
        </div>
        <span class="prod-badge ${status.cls}">${status.label}</span>
      </div>
      ${qtyBlockHTML}
    </div>`;
  }).join('');
}

// ─── PRODUTOS SEM VOLTAGEM ───────────────────────────────
function adj(id, delta) {
  const input = document.getElementById(`qty-${id}`);
  const val = Math.max(0, (parseInt(input.value) || 0) + delta);
  input.value = val; newQtys[id] = val;
}
function onQtyInput(id, val) { newQtys[id] = parseInt(val) || 0; }

async function saveQty(id) {
  const novaQty = newQtys[id];
  const prod = products.find(p => p.id === id);
  if (novaQty === undefined || !prod) return;

  const btn = document.getElementById(`btn-${id}`);
  btn.disabled = true;
  btn.textContent = '...';

  const { data, error } = await sb.rpc('registrar_contagem_estoque', {
    p_produto_id: id,
    p_quantidade: novaQty,
    p_voltagem: null
  });

  if (error) {
    btn.disabled = false;
    btn.textContent = 'Salvar';
    showToast(error.message || 'Nao foi possivel salvar.');
    return;
  }

  const produtoAtualizado = Array.isArray(data) ? data[0] : null;
  if (produtoAtualizado) {
    prod.quantidade = produtoAtualizado.quantidade;
    prod.quantidade_110v = produtoAtualizado.quantidade_110v;
    prod.quantidade_220v = produtoAtualizado.quantidade_220v;
  } else {
    prod.quantidade = novaQty;
  }

  btn.classList.add('saved');
  btn.textContent = 'Salvo';
  showToast(`${prod.nome} -> ${novaQty}`);
  setTimeout(() => {
    btn.disabled = false;
    btn.classList.remove('saved');
    btn.textContent = 'Salvar';
    renderCards();
  }, 1500);
}

// ─── PRODUTOS COM VOLTAGEM ────────────────────────────────
function adjVolt(id, volt, delta) {
  const input = document.getElementById(`qty-${id}-${volt === 'v110' ? '110' : '220'}`);
  const val = Math.max(0, (parseInt(input.value) || 0) + delta);
  input.value = val;
  if (!newQtysVolt[id]) newQtysVolt[id] = {};
  newQtysVolt[id][volt] = val;
}
function onQtyInputVolt(id, volt, val) {
  if (!newQtysVolt[id]) newQtysVolt[id] = {};
  newQtysVolt[id][volt] = parseInt(val) || 0;
}

async function saveQtyVolt(id, volt) {
  const prod = products.find(p => p.id === id);
  if (!prod) return;

  const novaQty = newQtysVolt[id]?.[volt];
  if (novaQty === undefined) return;

  const suffix = volt === 'v110' ? '110' : '220';
  const voltLabel = volt === 'v110' ? '110V' : '220V';
  const rpcVolt = volt === 'v110' ? '110v' : '220v';

  const btn = document.getElementById(`btn-${id}-${suffix}`);
  btn.disabled = true;
  btn.textContent = '...';

  const { data, error } = await sb.rpc('registrar_contagem_estoque', {
    p_produto_id: id,
    p_quantidade: novaQty,
    p_voltagem: rpcVolt
  });

  if (error) {
    btn.disabled = false;
    btn.textContent = `Salvar ${voltLabel}`;
    showToast(error.message || 'Nao foi possivel salvar.');
    return;
  }

  const produtoAtualizado = Array.isArray(data) ? data[0] : null;
  if (produtoAtualizado) {
    prod.quantidade = produtoAtualizado.quantidade;
    prod.quantidade_110v = produtoAtualizado.quantidade_110v;
    prod.quantidade_220v = produtoAtualizado.quantidade_220v;
  } else if (volt === 'v110') {
    prod.quantidade_110v = novaQty;
  } else {
    prod.quantidade_220v = novaQty;
  }

  btn.classList.add('saved');
  btn.textContent = `${voltLabel} salvo`;
  showToast(`${prod.nome} (${voltLabel}) -> ${novaQty}`);
  setTimeout(() => {
    btn.disabled = false;
    btn.classList.remove('saved');
    btn.textContent = `Salvar ${voltLabel}`;
    renderCards();
  }, 1500);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
checkSession();
</script>
</body>
</html>
